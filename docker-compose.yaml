services:
  # Baileys WhatsApp API (MongoDB incluído)
  baileys-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: vinicius666/baileys-api
    container_name: baileys_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: America/Sao_Paulo
    ports:
      - '127.0.0.1:3000:3000/tcp'
    volumes:
      - './sessions:/app/.sessions'
      - './.media:/app/.media'
      - baileys_uploads:/app/uploads
      - baileys_downloads:/app/downloads
      - baileys_auth:/app/auth_sessions
      - baileys_logs:/app/logs
      - baileys_mongodb:/data/db
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '10'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/management/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s


volumes:
  baileys_mongodb: {}
  baileys_uploads: {}
  baileys_downloads: {}
  baileys_auth: {}
  baileys_logs: {}