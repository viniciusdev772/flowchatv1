name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      run: |
        docker build . --file Dockerfile --tag ${{ secrets.DOCKER_USERNAME }}/baileys-api:latest
        docker build . --file Dockerfile --tag ${{ secrets.DOCKER_USERNAME }}/baileys-api:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/baileys-api:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/baileys-api:${{ github.sha }}
